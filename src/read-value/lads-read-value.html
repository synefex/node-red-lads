<script type="text/javascript">
  RED.nodes.registerType("lads-read-value", {
    // Space (not '-') in the category: Node-RED 4 splits ASCII-dashed
    // categories at the first '-' to form a collapsible parent group,
    // so "Synefex-LADS" would share a section with "Synefex-SiLA".
    // The space survives Node-RED's escape-then-display round-trip
    // (space → '_' in IDs, '_' → space in the displayed label) and
    // doesn't trigger the split, giving us a standalone section.
    category: "Synefex LADS",
    color: "#A6BBCF",
    defaults: {
      name: { value: "" },
      connection: { value: "", type: "lads-connection", required: true },
      nodeId: { value: "" },
      nodeIdType: { value: "str" },
      ladsPath: { value: "" },
      outputProperty: { value: "payload" },
      outputPropertyType: { value: "msg" },
      includeMeta: { value: false }
    },
    inputs: 1,
    outputs: 1,
    icon: "font-awesome/fa-eye",
    paletteLabel: "LADS read",
    label: function () {
      if (this.name) return this.name;
      if (this.nodeIdType === "str" && this.nodeId) return "read " + this.nodeId;
      return "LADS read";
    },
    oneditprepare: function () {
      $("#node-input-nodeId").typedInput({
        default: this.nodeIdType || "str",
        typeField: $("#node-input-nodeIdType"),
        types: ["str", "msg", "flow", "global", "env"]
      });
      $("#node-input-outputProperty").typedInput({
        default: this.outputPropertyType || "msg",
        typeField: $("#node-input-outputPropertyType"),
        types: ["msg", "flow", "global"]
      });

      // LADS picker — cascading device/FU/function/variable selectors. The
      // picker writes the resolved NodeId into #node-input-nodeId and stashes
      // the symbolic path in #node-input-ladsPath for restore on re-edit.
      if (window.LadsPicker) {
        window.LadsPicker.attach({
          kind: "variable",
          connectionFieldId: "node-input-connection",
          nodeIdFieldId: "node-input-nodeId",
          pathFieldId: "node-input-ladsPath",
        });
      }
    },
    oneditsave: function () {
      // Explicitly transfer the hidden ladsPath value into the node config.
      // Node-RED's default save reads visible inputs reliably; for hidden
      // inputs that are only written via JS (not user typing), being
      // explicit avoids "lost selection on copy/paste" reports.
      this.ladsPath = $("#node-input-ladsPath").val() || "";
    }
  });
</script>

<script type="text/html" data-template-name="lads-read-value">
  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-input-name">
  </div>
  <div class="form-row">
    <label for="node-input-connection"><i class="fa fa-server"></i> Connection</label>
    <input type="text" id="node-input-connection">
  </div>
  <div class="form-row">
    <label for="node-input-nodeId"><i class="fa fa-hashtag"></i> NodeId</label>
    <input type="text" id="node-input-nodeId" placeholder="ns=6;s=Temperature.RawValue">
    <input type="hidden" id="node-input-nodeIdType">
    <input type="hidden" id="node-input-ladsPath">
  </div>
  <div class="form-row">
    <label for="node-input-outputProperty"><i class="fa fa-arrow-right"></i> Output to</label>
    <input type="text" id="node-input-outputProperty">
    <input type="hidden" id="node-input-outputPropertyType">
  </div>
  <div class="form-row">
    <label for="node-input-includeMeta" style="width:auto">
      <input type="checkbox" id="node-input-includeMeta" style="display:inline-block; width:auto; vertical-align:middle">
      Attach OPC UA metadata as <code>msg.lads</code>
    </label>
  </div>
</script>

<script type="text/html" data-help-name="lads-read-value">
  <p>Reads the <code>Value</code> attribute of a single OPC UA node.</p>

  <h3>Input</h3>
  <dl class="message-properties">
    <dt class="optional">payload <span class="property-type">any</span></dt>
    <dd>Triggers the read. Content is ignored unless the NodeId source is
    set to a message property.</dd>
  </dl>

  <h3>Output</h3>
  <dl class="message-properties">
    <dt>payload <span class="property-type">any</span></dt>
    <dd>The decoded value. <code>LocalizedText</code> is unwrapped to its
    <code>text</code> field; <code>QualifiedName</code> to its
    <code>name</code>. All other types pass through as <code>node-opcua</code>
    returns them. Output target is configurable.</dd>
    <dt class="optional">lads <span class="property-type">object</span></dt>
    <dd>Present when "Attach OPC UA metadata" is enabled. Includes
    <code>nodeId</code>, <code>dataType</code>, <code>arrayType</code>,
    <code>statusCode</code>, <code>sourceTimestamp</code>,
    <code>serverTimestamp</code>.</dd>
  </dl>

  <h3>Errors</h3>
  <p>If the read returns a non-good <code>StatusCode</code>, or the OPC UA
  call throws, the node calls <code>done(err)</code> so a Catch node can
  handle it.</p>

  <h3>NodeId formats</h3>
  <pre>ns=6;s=Temperature.RawValue
ns=4;i=12345
ns=2;s=MyDevice/MyFunctionalUnit/CurrentValue</pre>
  <p>Set the typed-input to <code>msg</code>/<code>flow</code>/<code>global</code>
  to source the NodeId from a message property or context — useful when the
  same node reads different addresses based on flow state.</p>
</script>
